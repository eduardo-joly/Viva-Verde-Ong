<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doar</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="doar">
    <header>
        <div class="logo">Viva Verde</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="quem-somos.html">Quem Somos</a></li>
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="voluntariado.html">Voluntariado</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="doar.html">Doações</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="doar">
            <div class="container-conteudo">
                <h2>Formulário de Doação</h2>
                <form action="#" method="post">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">

                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Seu nome completo">

                    <label for="telefone">Telefone:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="seuemail@email.com">

                    <label for="valor">Valor da Doação (R$):</label>
                    <input type="number" id="valor" name="valor" required min="1" step="0.01" placeholder="50.00">

                    <label for="pagamento">Forma de Pagamento:</label>
                    <select id="pagamento" name="pagamento" required>
                        <option value="">Selecione</option>
                        <option value="pix">PIX</option>
                        <option value="cartao">Cartão de Crédito</option>
                        <option value="boleto">Boleto</option>
                    </select>

                    <button type="submit">Doar Agora</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="site-footer">
            <p><small>&copy; 2025 Ong Viva Verde. Todos os direitos reservados.</small></p>
        </div>
    </footer>
</body>
</html>
